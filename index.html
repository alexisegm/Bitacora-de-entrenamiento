<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora de Entrenamiento - Panel Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header">
        <h1>Mi Bitácora de Entrenamiento</h1>
    </header>

    <section class="summary-panel container">
        <div class="summary-stats">
            <h2>Resumen Semanal</h2>
            <p id="weekly-progress-text">0 de 0 ejercicios completados</p>
            
            <div class="progress-bar-container">
                <div id="weekly-progress-bar" class="progress-bar"></div>
            </div>
            
            <p id="achievement-message" class="achievement-message hidden">
                ¡Objetivo alcanzado! 🎉 ¡Excelente constancia esta semana!
            </p>
        </div>

        <div class="summary-controls">
            <button id="btn-reset" class="btn btn-danger">Reiniciar Semana</button>
            <button id="btn-timer" class="btn btn-primary">Descanso</button>
            <span id="timer-display" class="timer-display"></span>
        </div>
    </section>

    <main id="app-container" class="container">
        </main>

    <script src="app.js" defer></script>
</body>
</html>
